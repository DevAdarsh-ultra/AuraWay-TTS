name: Build AuraWay APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # This is the most reliable action for Kivy/KivyMD
        uses: Akuli/buildozer-action@v1
        with:
          save-cache: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AuraWay-TTS
          path: bin/*.apk
          
